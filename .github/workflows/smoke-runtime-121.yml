name: Smoke Runtime 1.21

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Smoke profile from scripts/smoke/smoke-profiles.json"
        required: true
        default: "foundation"
        type: choice
        options:
          - foundation
          - core-addons
          - monorepo-all
      timeout_seconds:
        description: "Seconds to wait for Paper startup (use >=360 for monorepo-all)"
        required: true
        default: "120"

permissions:
  contents: read

jobs:
  paper_runtime:
    name: Paper runtime smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run Paper smoke server
        shell: pwsh
        run: |
          ./scripts/smoke/run-smoke-server.ps1 `
            -Profile "${{ inputs.profile }}" `
            -Clean `
            -TimeoutSeconds ${{ inputs.timeout_seconds }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: smoke-runtime-${{ inputs.profile }}-logs
          path: |
            .smoke/${{ inputs.profile }}/server/logs
            .smoke/${{ inputs.profile }}/artifact-manifest.json
          if-no-files-found: ignore
