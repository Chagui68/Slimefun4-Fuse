name: "Gate 2: Stable Addons (Quick Wins)"

on:
  push:
    branches: [ "1.21-latin" ]
  workflow_dispatch:

jobs:
  stable-addons:
    name: "Stable Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Stable Addons
        run: |
          mvn -B clean install -DskipTests -pl sources/community-addons/MiniBlocks,sources/community-addons/DyeBench,sources/community-addons/MapJammers,sources/community-addons/MissileWarfare,sources/community-addons/Element-Manipulation,sources/community-addons/HeadLimiter,sources/community-addons/SlimeHUD,sources/community-addons/SmallSpace,sources/community-addons/Quaptics,sources/community-addons/MoreResearches,sources/community-addons/SfBetterChests -am
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
