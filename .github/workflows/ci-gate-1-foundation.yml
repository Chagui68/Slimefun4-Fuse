name: "Gate 1: Foundation (Essential)"

on:
  push:
    branches: [ "1.21-latin" ]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [ "1.21-latin" ]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

jobs:
  foundation:
    name: "Foundation Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Base Stack
        run: |
          mvn -B clean install -DskipTests -pl sources/dough-core,sources/slimefun-core/Slimefun4-src,sources/batch-2-expansion/SefiLib,sources/batch-2-expansion/InfinityLib,sources/internal-metadata/patches/commons-lang-drake-patched -am
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
