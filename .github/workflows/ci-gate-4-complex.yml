name: "Gate 4: Complex & Heavy (The Rebels)"

on:
  push:
    branches: [ "1.21-latin" ]
  workflow_dispatch:

jobs:
  complex-addons:
    name: "Complex Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Complex Addons
        run: |
          mvn -B clean install -DskipTests -pl sources/repos-to-port/DynaTech,sources/batch-2-expansion/Cultivation_Updated,sources/batch-2-expansion/SlimeTinker,sources/batch-2-expansion/SMG,sources/batch-2-expansion/Supreme,sources/batch-2-expansion/TranscEndence,sources/community-addons/GeneticChickengineering-Reborn,sources/community-addons/PotionExpansion,sources/community-addons/CompressionCraft,sources/community-addons/Netheopoiesis,sources/community-addons/UltimateGenerators2 -am
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
