name: "Gate 4: Complex & Heavy (The Rebels)"

on:
  push:
    branches: [ "1.21-latin" ]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [ "1.21-latin" ]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

jobs:
  complex-addons:
    name: "Complex Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Complex Addons
        run: |
          mvn -B clean install -DskipTests -pl sources/batch-2-expansion/Supreme -am
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
