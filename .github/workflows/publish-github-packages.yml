# Publica SNAPSHOTs del núcleo en GitHub Packages (maven.pkg.github.com/DrakesCraft-Labs/drakes-slimefun-labs).
# Manual: Actions → "Publish Maven (GitHub Packages)" → Run workflow.
name: Publish Maven (GitHub Packages)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy-core:
    name: Deploy núcleo Maven
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # setup-java a veces no alinea el <server id="github"/> con el deploy-plugin para SNAPSHOTs → 401 en metadata.
      - name: Maven settings para GitHub Packages (id github)
        env:
          PKG_USER: ${{ github.actor }}
          PKG_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${PKG_USER}</username>
                <password>${PKG_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      # El reactor raíz tiene maven.deploy.skip=true; el POM padre se publica aparte.
      - name: Deploy POM agregador (paquete drakes-slimefun-labs)
        run: mvn -B -N deploy -DskipTests -Dmaven.deploy.skip=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Dough, Slimefun, SefiLib, InfinityLib
        run: |
          mvn -B deploy -DskipTests \
            -pl sources/dough-core,sources/slimefun-core/Slimefun4-src,sources/batch-2-expansion/SefiLib,sources/batch-2-expansion/InfinityLib \
            -am
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
