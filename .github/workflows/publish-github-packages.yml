# Publica SNAPSHOTs del núcleo en GitHub Packages (maven.pkg.github.com/DrakesCraft-Labs/drakes-slimefun-labs).
# Manual: Actions → "Publish Maven (GitHub Packages)" → Run workflow.
name: Publish Maven (GitHub Packages)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy-core:
    name: Deploy núcleo Maven
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.GITHUB_TOKEN }}

      # El reactor raíz tiene maven.deploy.skip=true; el POM padre se publica aparte.
      - name: Deploy POM agregador (paquete drakes-slimefun-labs)
        run: mvn -B -N deploy -DskipTests -Dmaven.deploy.skip=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Dough, Slimefun, SefiLib, InfinityLib
        run: |
          mvn -B deploy -DskipTests \
            -pl sources/dough-core,sources/slimefun-core/Slimefun4-src,sources/batch-2-expansion/SefiLib,sources/batch-2-expansion/InfinityLib \
            -am
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
