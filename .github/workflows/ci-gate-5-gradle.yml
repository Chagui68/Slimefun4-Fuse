name: "Gate 5: Gradle Front"

on:
  push:
    branches: [ "1.21-latin" ]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [ "1.21-latin" ]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

jobs:
  gradle-addons:
    name: "Gradle Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Pre-build Foundation (Maven)
        run: |
          mvn -B clean install -DskipTests -pl sources/dough-core,sources/slimefun-core/Slimefun4-src,sources/batch-2-expansion/SefiLib,sources/batch-2-expansion/InfinityLib -am
          
      - name: Build Gradle Modules
        run: |
          # Galactifun
          cd sources/batch-2-expansion/Galactifun
          chmod +x gradlew
          ./gradlew build -x test
          cd ../../..
          
          # SlimefunTranslation
          # Temporarily excluded while migrating legacy API surface
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
