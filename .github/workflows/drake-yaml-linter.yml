name: Drake YAML Linter

on:
  push:
    paths:
    - '**.yml'
  pull_request:
    branches:
    - 1.21-latin

permissions:
  contents: read

jobs:
  linter:

    name: YAML Linter
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: YAML Linter
      uses: ibiqlik/action-yamllint@v3.1.1
