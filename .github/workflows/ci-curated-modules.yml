name: Curated Maven CI

on:
  push:
    branches:
      - 1.21-latin
  pull_request:
    branches:
      - 1.21-latin
  workflow_dispatch:
    inputs:
      group:
        description: Curated module group to build
        required: true
        default: all
        type: choice
        options:
          - all
          - core-stack
          - ecosystem-libs
          - validated-addons

concurrency:
  group: curated-maven-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  curated-build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Core Stack
            group: core-stack
            commands: |
              mvn -B -U -pl sources/slimefun-core/Slimefun4-src -am -DskipTests package
            artifact_name: core-stack-jars
            artifact_paths: |
              sources/dough-core/target/*.jar
              sources/slimefun-core/Slimefun4-src/target/*.jar
          - name: Ecosystem Libraries
            group: ecosystem-libs
            commands: |
              mvn -B -U -pl sources/batch-2-expansion/InfinityLib -am -DskipTests package
              mvn -B -U -pl sources/repos-to-port/InfinityExpansion -am -DskipTests package
            artifact_name: ecosystem-libs-jars
            artifact_paths: |
              sources/batch-2-expansion/InfinityLib/target/*.jar
              sources/repos-to-port/InfinityExpansion/target/*.jar
          - name: Validated Addons
            group: validated-addons
            commands: |
              mvn -B -U -pl sources/repos-to-port/SimpleUtils -am -DskipTests package
              mvn -B -U -pl sources/repos-to-port/SFCalc -am -DskipTests package
              mvn -B -U -pl sources/repos-to-port/SlimyRepair -am -DskipTests package
            artifact_name: validated-addons-jars
            artifact_paths: |
              sources/repos-to-port/SimpleUtils/target/*.jar
              sources/repos-to-port/SFCalc/target/*.jar
              sources/repos-to-port/SlimyRepair/target/*.jar

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build curated group
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.group == 'all' || github.event.inputs.group == matrix.group
        shell: bash
        run: ${{ matrix.commands }}

      - name: Upload build artifacts
        if: success() && (github.event_name != 'workflow_dispatch' || github.event.inputs.group == 'all' || github.event.inputs.group == matrix.group)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ matrix.artifact_paths }}
