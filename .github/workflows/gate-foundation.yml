name: "Gate: Foundation"

on:
  # push:
    # branches: [1.21-latin]
  workflow_dispatch:

concurrency:
  group: gate-foundation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          server-id: github
          settings-path: ${{ github.workspace }}
      
      - name: Build Foundation
        run: mvn -B clean deploy -DskipTests -pl sources/dough-core,sources/slimefun-core/Slimefun4-src,sources/batch-2-expansion/InfinityLib,sources/batch-2-expansion/SefiLib -am -Dmaven.deploy.skip=false -s ${{ github.workspace }}/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
