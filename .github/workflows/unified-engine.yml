name: "DrakesLab Unified Engine"

on:
  push:
    branches: [ "1.21-latin" ]
  workflow_dispatch:

jobs:
  audit:
    name: "Ecosystem Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run Audit
        run: |
          export PYTHONIOENCODING="utf-8"
          python scripts/manager.py audit

  maven-reactor:
    name: "Maven Reactor (80 Addons)"
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Build Foundation & Addons
        run: mvn -B clean install -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gradle-reactor:
    name: "Gradle Reactor (9 Addons)"
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execution permission for gradlew
        run: chmod +x gradlew

      - name: Build Gradle Modules
        run: ./gradlew build -x test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: "Unified Deployment"
    needs: [maven-reactor, gradle-reactor]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Deploy Core Modules to GitHub Packages
        run: |
          mvn -B deploy -DskipTests -pl sources/dough-core,sources/slimefun-core/Slimefun4-src,sources/batch-2-expansion/SefiLib,sources/batch-2-expansion/InfinityLib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
