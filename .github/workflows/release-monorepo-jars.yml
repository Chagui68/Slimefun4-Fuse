name: Release monorepo JARs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de GitHub Release (ej. v11-plugins-2026-04-25). Debe ser único."
        required: true
        type: string
      draft:
        description: "Crear el release como borrador"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Marcar como pre-release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  RELEASE_DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || 'false' }}
  RELEASE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}

jobs:
  build_and_release:
    name: Maven package + JARs (release assets)
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Set up Gradle (SlimefunTranslation → UltimateGenerators2)
        uses: gradle/actions/setup-gradle@v6

      # UltimateGenerators2 referencia el JAR de SlimefunTranslation por systemPath (mismo orden que CI monorepo).
      - name: Instalar núcleo Maven y shadowJar SlimefunTranslation
        run: |
          mvn -B clean install -Dmaven.test.skip=true \
            -pl sources/dough-core,sources/slimefun-core/Slimefun4-src,sources/batch-2-expansion/SefiLib,sources/batch-2-expansion/InfinityLib,sources/repos-to-port/InfinityExpansion \
            -am
          cd sources/community-addons/SlimefunTranslation
          chmod +x ./gradlew
          ./gradlew --no-daemon shadowJar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Maven package (reactor)
        run: mvn -B -Dmaven.test.skip=true package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect plugin JARs
        run: python scripts/release/collect_monorepo_jars.py --out dist/monorepo-jars

      - name: Upload build artifact (carpeta de JARs)
        uses: actions/upload-artifact@v7
        with:
          name: monorepo-plugins-${{ env.RELEASE_TAG }}
          path: dist/monorepo-jars/

      - name: Create GitHub Release (un asset .jar por addon)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          draft: ${{ env.RELEASE_DRAFT }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          generate_release_notes: true
          files: |
            dist/monorepo-jars/*.jar
            dist/monorepo-jars/manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
