name: "Gate 3: Community & Repos (Main Batch)"

on:
  push:
    branches: [ "1.21-latin" ]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [ "1.21-latin" ]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

jobs:
  community-addons:
    name: "Community Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Community Batch
        run: |
          mvn -B clean install -DskipTests -pl sources/repos-to-port/ExtraUtils,sources/community-addons/DankTech2 -am
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
