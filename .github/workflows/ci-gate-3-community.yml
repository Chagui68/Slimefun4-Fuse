name: "Gate 3: Community & Repos (Main Batch)"

on:
  push:
    branches: [ "1.21-latin" ]
  workflow_dispatch:

jobs:
  community-addons:
    name: "Community Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Community Batch
        run: |
          mvn -B clean install -DskipTests -pl sources/repos-to-port/ColoredEnderChests,sources/repos-to-port/DyedBackpacks,sources/repos-to-port/EcoPower,sources/repos-to-port/ElectricSpawners,sources/repos-to-port/ExoticGarden,sources/repos-to-port/ExtraGear,sources/repos-to-port/ExtraHeads,sources/repos-to-port/ExtraUtils,sources/repos-to-port/FluffyMachines,sources/repos-to-port/GlobalWarming,sources/repos-to-port/HardcoreSlimefun,sources/repos-to-port/HotbarPets,sources/repos-to-port/InfinityExpansion,sources/repos-to-port/luckyblocks-sf,sources/repos-to-port/MobCapturer,sources/repos-to-port/PrivateStorage,sources/repos-to-port/SFCalc,sources/repos-to-port/SFMobDrops,sources/repos-to-port/SimpleUtils,sources/repos-to-port/SlimeChem,sources/repos-to-port/SlimefunOreChunks,sources/repos-to-port/SlimyRepair,sources/repos-to-port/SlimyTreeTaps,sources/repos-to-port/SoulJars,sources/repos-to-port/SoundMuffler,sources/community-addons/AlchimiaVitae,sources/community-addons/CrystamaeHistoria,sources/community-addons/DankTech2,sources/community-addons/ExtraTools,sources/community-addons/FlowerPower,sources/community-addons/FN-FAL-s-Amplifications,sources/community-addons/FoxyMachines,sources/community-addons/Liquid,sources/community-addons/Magic-8-Ball,sources/community-addons/SfChunkInfo,sources/community-addons/Simple-Storage,sources/community-addons/SlimeCustomizer,sources/community-addons/VillagerUtil,sources/community-addons/Wildernether,sources/community-addons/WorldEditSlimefun,sources/community-addons/AdvancedTech,sources/community-addons/Better-Nuclear-Generator,sources/community-addons/EMCTech,sources/community-addons/Gastronomicon,sources/community-addons/Geyser-Slimefun-Heads,sources/community-addons/RelicsOfCthonia,sources/community-addons/SaneCrafting,sources/community-addons/SlimeFrame,sources/community-addons/SlimefunAdvancements,sources/community-addons/SpiritsUnchained,sources/community-addons/VillagerTrade -am
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
