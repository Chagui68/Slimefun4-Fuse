# Actualizaciones de dependencias con bajo ruido (no sustituye revision humana del port 1.21).
#
# groups: menos ramas dependabot/* — un PR agrupado por ecosistema (Actions) y por tipo
# Maven (produccion vs desarrollo). Los PRs viejos “uno por dependencia” se pueden cerrar
# tras fusionar o sustituir por los nuevos agrupados.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    groups:
      actions-all:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    groups:
      maven-production:
        dependency-type: "production"
      maven-development:
        dependency-type: "development"
    labels:
      - "dependencies"
      - "java"
      - "maven"
    ignore:
      # Spring 7.x implica Jakarta 9+ / cambios de plataforma; subir solo en PR dedicado.
      - dependency-name: "org.springframework:spring-context"
        update-types: ["version-update:semver-major"]
