# Actualizaciones de dependencias con bajo ruido (no sustituye revision humana del port 1.21).

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "java"
      - "maven"
    ignore:
      # Spring 7.x implica Jakarta 9+ / cambios de plataforma; subir solo en PR dedicado.
      - dependency-name: "org.springframework:spring-context"
        update-types: ["version-update:semver-major"]
