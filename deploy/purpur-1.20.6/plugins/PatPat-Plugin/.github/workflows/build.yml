name: Build plugin with MockBukkit tests

on: [push, workflow_call]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: build/reports/
      - name: Check if jar exists
        run: |
          shopt -s nullglob
          jars=(libs/*.jar)
          (( ${#jars[@]} > 0 )) || exit 1
      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: libs/*.jar
